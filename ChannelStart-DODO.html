/* ─── SHARED COMPONENTS ─── */
function Card({ children, style={}, glow, onClick }) {
  return <div onClick={onClick} style={{ background:DS.cardBg, border:`1px solid ${glow?DS.cardBorderHover:DS.cardBorder}`, borderRadius:16, padding:20, marginBottom:12, cursor:onClick?"pointer":"default", ...style }}>{children}</div>;
}
function Badge({ children, color="gold" }) {
  const c={gold:{bg:DS.goldBg,border:DS.goldBorder,text:DS.gold},green:{bg:DS.greenBg,border:DS.greenBorder,text:DS.green},purple:{bg:DS.purpleBg,border:DS.purpleBorder,text:DS.purple},dim:{bg:"rgba(255,255,255,0.05)",border:"rgba(255,255,255,0.1)",text:DS.textSecondary}}[color];
  return <span style={{ display:"inline-flex",alignItems:"center",gap:4,background:c.bg,border:`1px solid ${c.border}`,color:c.text,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600 }}>{children}</span>;
}
function Btn({ children, onClick, disabled, variant="primary", style={} }) {
  const v={primary:{background:`linear-gradient(135deg,${DS.gold},${DS.orange})`,color:"#000",padding:"10px 20px",fontSize:14},secondary:{background:"rgba(255,255,255,0.06)",color:DS.textSecondary,padding:"10px 20px",fontSize:14,border:`1px solid rgba(255,255,255,0.1)`},small:{background:`linear-gradient(135deg,${DS.gold},${DS.orange})`,color:"#000",padding:"6px 14px",fontSize:12},purple:{background:`linear-gradient(135deg,${DS.purple},#7c3aed)`,color:"#fff",padding:"10px 20px",fontSize:14}}[variant];
  return <button onClick={disabled?undefined:onClick} style={{ border:"none",borderRadius:10,fontWeight:700,cursor:disabled?"not-allowed":"pointer",transition:"all 0.2s",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:6,opacity:disabled?0.4:1,...v,...style }}>{children}</button>;
}
function SH({ emoji, title, count, right }) {
  return <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14 }}><div style={{ display:"flex",alignItems:"center",gap:8 }}><span style={{ fontSize:18 }}>{emoji}</span><span style={{ fontSize:16,fontWeight:800,color:DS.textPrimary }}>{title}</span>{count!==undefined&&<Badge color="dim">{count}</Badge>}</div>{right}</div>;
}
function Inp({ value, onChange, placeholder }) {
  return <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{ width:"100%",background:DS.inputBg,border:`1px solid ${DS.inputBorder}`,borderRadius:10,padding:"11px 14px",color:DS.textPrimary,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box" }} />;
}
function Txa({ value, onChange, placeholder, rows=3 }) {
  return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{ width:"100%",background:DS.inputBg,border:`1px solid ${DS.inputBorder}`,borderRadius:10,padding:"11px 14px",color:DS.textPrimary,fontSize:14,fontFamily:"inherit",outline:"none",resize:"none",lineHeight:1.6,boxSizing:"border-box" }} />;
}
function Lbl({ children, sub }) {
  return <div style={{ marginBottom:6 }}><div style={{ fontSize:13,fontWeight:700,color:DS.textPrimary }}>{children}</div>{sub&&<div style={{ fontSize:11,color:DS.textDim,marginTop:2 }}>{sub}</div>}</div>;
}
function Tags({ options, selected, onToggle, multi=true }) {
  return <div style={{ display:"flex",flexWrap:"wrap",gap:8 }}>{options.map(opt=>{const isObj=typeof opt==="object";const label=isObj?opt.label:opt;const active=multi?selected.includes(label):selected===label;return<button key={label} onClick={()=>onToggle(label)} style={{ padding:"8px 14px",borderRadius:10,fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer",border:"1px solid",background:active?DS.goldBg:"rgba(255,255,255,0.03)",borderColor:active?DS.goldBorder:DS.inputBorder,color:active?DS.gold:DS.textSecondary }}>{isObj&&opt.emoji&&<span style={{ marginRight:4 }}>{opt.emoji}</span>}{label}</button>})}</div>;
}
function Steps({ steps, current }) {
  return <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:24,flexWrap:"wrap" }}>{steps.map((s,i)=><div key={i} style={{ display:"flex",alignItems:"center",gap:6 }}><div style={{ width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,background:i<current?DS.gold:i===current?DS.goldBg:"rgba(255,255,255,0.04)",color:i<current?"#000":i===current?DS.gold:DS.textDim,border:i===current?`2px solid ${DS.gold}`:"none" }}>{i<current?"✓":i+1}</div>{i<steps.length-1&&<div style={{ width:16,height:2,background:i<current?DS.gold:"rgba(255,255,255,0.06)" }} />}</div>)}</div>;
}
function Spin({ text }) {
  return <Card style={{ textAlign:"center",padding:40 }}><style>{`@keyframes ds{to{transform:rotate(360deg)}}`}</style><div style={{ width:40,height:40,border:`3px solid rgba(245,180,50,0.15)`,borderTopColor:DS.gold,borderRadius:"50%",animation:"ds 1s linear infinite",margin:"0 auto 16px" }} /><div style={{ color:DS.textSecondary,fontSize:14 }}>{text}</div></Card>;
}
function PBadge({ platform }) {
  const p=PLATFORMS[platform];return<span style={{ display:"inline-flex",alignItems:"center",gap:5,background:p.colorBg,border:`1px solid ${p.colorBorder}`,color:p.color,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600 }}>{p.icon} {p.name}</span>;
}

function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
  };
  return <button onClick={copy} style={{ background: copied ? DS.greenBg : "rgba(255,255,255,0.06)", border: `1px solid ${copied ? DS.greenBorder : DS.inputBorder}`, borderRadius: 8, padding: "4px 10px", fontSize: 11, fontWeight: 600, color: copied ? DS.green : DS.textDim, cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s" }}>{copied ? "✓ 복사됨" : "복사"}</button>;
}

        <div style={{width:"100%",height:10,background:"rgba(255,255,255,0.04)",borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",borderRadius:5,transition:"width 0.5s",background:`linear-gradient(90deg,${DS.gold},${DS.orange})`,width:`${pct}%`}} /></div>
        {pct===100&&<div style={{textAlign:"center",marginTop:10,color:DS.green,fontSize:13,fontWeight:700}}>🎉 완료!</div>}

          {cat.items.map(item=><div key={item.id}><div onClick={()=>toggle(item.id)} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 10px",borderRadius:10,cursor:"pointer",background:checked[item.id]?DS.goldBg:"transparent",marginBottom:2}}>
            <div style={{width:20,height:20,borderRadius:6,flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",background:checked[item.id]?DS.gold:"transparent",border:checked[item.id]?"none":`2px solid rgba(255,255,255,0.15)`}}>{checked[item.id]&&<span style={{color:"#000",fontSize:12,fontWeight:900}}>✓</span>}</div>
            <span style={{flex:1,fontSize:13,color:checked[item.id]?DS.textDim:DS.textPrimary,textDecoration:checked[item.id]?"line-through":"none"}}>{item.text}</span>
            <button onClick={e=>{e.stopPropagation();setTip(tip===item.id?null:item.id)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:DS.textDim,padding:0}}>💡</button>
          </div>{tip===item.id&&<div style={{marginLeft:40,marginRight:30,marginBottom:8,padding:10,background:DS.goldBg,borderRadius:10,border:`1px solid ${DS.goldBorder}`}}><div style={{fontSize:12,color:DS.goldDim,lineHeight:1.5}}>{item.tip}</div></div>}</div>)}
        </Card>
      )})}

  );
}

/* ═══════════════════════════════
   PHASE 5: GLOBAL EXPANSION
   ═══════════════════════════════ */
function GlobalExpansion({ onBack, platform, apiKey }) {
  const [mode, setMode] = useState(null);
  const [step, setStep] = useState(0);
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [activeLang, setActiveLang] = useState(0);
  const [sourceLang, setSourceLang] = useState("ko");
  const [selectedLangs, setSelectedLangs] = useState([]);
  const [pasteText, setPasteText] = useState("");
  const [source, setSource] = useState({
    title: "", description: "", hashtags: "", thumbnailText: "",
    hookScript: "", keywords: "", scriptSummary: "",
  });

  const p = PLATFORMS[platform];
  var srcLangObj = LANGUAGES.find(function(l){return l.code === sourceLang}) || LANGUAGES[0];
  var targetLangs = LANGUAGES.filter(function(l){return l.code !== sourceLang});

  const toggleLang = (code) => {
    setSelectedLangs(prev =>
      prev.includes(code) ? prev.filter(c => c !== code) : prev.length < 5 ? [...prev, code] : prev
    );
  };

  // Steps: paste=[paste,src,target,generate], step=[input,src,target,generate]
  var stepsArr = mode === "paste"
    ? ["정보 붙여넣기", "원본 언어", "타겟 언어", "AI 현지화"]
    : ["소스 입력", "원본 언어", "타겟 언어", "AI 현지화"];

  var canNext = function() {
    if (step === 0) return mode === "paste" ? pasteText.length > 10 : source.title.length > 1;
    if (step === 1) return true; // source lang always selected
    if (step === 2) return selectedLangs.length > 0;
    return true;
  };

  var buildLangParts = function() {
    var langNames = selectedLangs.map(function(c){ return LANGUAGES.find(function(l){return l.code===c}); }).filter(Boolean);
    var langList = langNames.map(function(l){ return l.name + " (" + l.code + ")"; }).join(", ");
    var langJsonArr = langNames.map(function(l){
      return '{"langCode":"' + l.code + '","langName":"' + l.name + '","flag":"' + l.flag +
        '","title":"현지화된 제목","description":"현지화된 설명글","hashtags":["태그1","태그2","태그3","태그4","태그5","태그6","태그7","태그8","태그9","태그10"],"thumbnailText":"썸네일","hookScript":"후킹 대사","seoKeywords":["키워드1","키워드2","키워드3","키워드4","키워드5","키워드6","키워드7","키워드8"],"culturalNote":"현지화 포인트 1~2문장"}';
    }).join(",");
    return { langNames: langNames, langList: langList, langJsonArr: langJsonArr };
  };

  var doFetch = async function(prompt, maxTok) {
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-dangerous-direct-browser-access": "true", "anthropic-version": "2023-06-01" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: maxTok || 4000, messages: [{ role: "user", content: prompt }] }),
    });
    var d = await res.json();
    var text = (d.content || []).map(function(c) { return c.text || ""; }).join("");
    return text.replace(/```json/g, "").replace(/```/g, "").trim();
  };

  var localizeStep = async function() {
    if (!apiKey) { setResults("nokey"); return; }
    setLoading(true);
    var parts = buildLangParts();
    var hookT = platform === "tiktok" ? "3초" : "15초";
    var seoT = platform === "youtube" ? "YouTube SEO" : platform === "instagram" ? "Instagram 캡션" : "TikTok 캡션";
    try {
      var prompt = "글로벌 콘텐츠 현지화 전문가. 단순 번역이 아닌 각 시장의 문화/트렌드/검색 패턴에 맞는 현지화.\n\n플랫폼: " + p.name + "\n원본 언어: " + srcLangObj.name + " (" + srcLangObj.code + ")\n\n소스:\n- 제목: " + source.title + "\n- 설명글: " + source.description + "\n- 해시태그: " + source.hashtags + "\n- 썸네일: " + source.thumbnailText + "\n- 후킹(첫 " + hookT + "): " + source.hookScript + "\n- 키워드: " + source.keywords + "\n- 대본요약: " + source.scriptSummary + "\n\n타겟: " + parts.langList + "\n\n규칙: 1.직역금지 2.해시태그=현지트렌드10개 3.썸네일=짧고임팩트 4.후킹=현지감정자극 5.SEO=현지검색8개 6.설명=" + seoT + "최적화\n\nJSON만(백틱없이):\n{\"localizations\":[" + parts.langJsonArr + "]}";
      var clean = await doFetch(prompt);
      setResults(JSON.parse(clean).localizations || []);
      setActiveLang(0);
    } catch(e) { console.error("API Error:", e); setResults("error"); }
    setLoading(false);
  };

  var localizePaste = async function() {
    if (!apiKey) { setResults("nokey"); return; }
    setLoading(true);
    var parts = buildLangParts();
    var seoT = platform === "youtube" ? "YouTube SEO" : platform === "instagram" ? "Instagram 캡션" : "TikTok 캡션";
    try {
      var prompt = "글로벌 콘텐츠 현지화 전문가. 단순 번역이 아닌 각 시장의 문화/트렌드/검색 패턴에 맞는 현지화.\n\n플랫폼: " + p.name + "\n원본 언어: " + srcLangObj.name + " (" + srcLangObj.code + ")\n\n아래는 사용자가 붙여넣기한 콘텐츠 정보입니다. 제목, 설명, 해시태그, 썸네일, 후킹, 키워드를 추출하여 각 언어로 현지화하세요:\n\n" + pasteText + "\n\n타겟: " + parts.langList + "\n\n규칙: 1.직역금지 2.해시태그=현지트렌드10개 3.썸네일=짧고임팩트 4.후킹=현지감정자극 5.SEO=현지검색8개 6.설명=" + seoT + "최적화\n\nJSON만(백틱없이):\n{\"localizations\":[" + parts.langJsonArr + "]}";
      var clean = await doFetch(prompt);
      setResults(JSON.parse(clean).localizations || []);
      setActiveLang(0);
    } catch(e) { console.error("API Error:", e); setResults("error"); }
    setLoading(false);
  };

  var currentLocalize = mode === "paste" ? localizePaste : localizeStep;

  var updateSource = function(key, val) {
    setSource(function(prev) { var next = Object.assign({}, prev); next[key] = val; return next; });
  };

  var resetAll = function() {
    setResults(null); setMode(null); setStep(0); setPasteText("");
    setSelectedLangs([]); setActiveLang(0);
    setSource({ title:"", description:"", hashtags:"", thumbnailText:"", hookScript:"", keywords:"", scriptSummary:"" });
  };

  // Clear selected target langs when source changes (if conflict)
  var handleSourceChange = function(code) {
    setSourceLang(code);
    setSelectedLangs(function(prev) { return prev.filter(function(c){return c !== code}); });
  };

  var hasResults = results !== null && results !== "error" && Array.isArray(results);
  var isError = results === "error" || results === "nokey";
  var activeResult = hasResults ? results[activeLang] : null;

  // Direction label
  var dirLabel = srcLangObj.flag + " " + srcLangObj.name + " → " + selectedLangs.length + "개 언어";

  return (
    <div>
      <button onClick={onBack} style={{ background: "none", border: "none", color: DS.textDim, cursor: "pointer", fontSize: 13, fontFamily: "inherit", marginBottom: 16, padding: 0 }}>← 홈</button>
      <div style={{ textAlign: "center", marginBottom: 8 }}>
        <Badge color="purple">🚀 채널스타트[글로벌번역]-DODO</Badge>
        {" "}
        <PBadge platform={platform} />
      </div>
      <h2 style={{ textAlign: "center", fontSize: 24, fontWeight: 900, margin: "8px 0 6px", background: "linear-gradient(135deg, " + DS.purple + ", #7c3aed)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
        🌏 글로벌 확장 언어변환기
      </h2>
      <p style={{ textAlign: "center", color: DS.textDim, fontSize: 13, marginBottom: 24 }}>
        모든 언어 ↔ 모든 언어 · AI 현지화 (단순 번역 ✕)
      </p>

      {/* Mode Selection */}
      {mode === null && !hasResults && !isError && !loading && (
        <div>
          <Card onClick={function(){setMode("paste");setStep(0)}} glow style={{cursor:"pointer",padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:48,height:48,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:DS.purpleBg,border:"1px solid "+DS.purpleBorder}}>📋</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                  <span style={{fontSize:15,fontWeight:800,color:DS.textPrimary}}>한번에 붙여넣기</span>
                  <Badge color="green">QUICK</Badge>
                </div>
                <div style={{fontSize:12,color:DS.textDim}}>제목·설명·해시태그·대본 등을 한번에 복붙</div>
              </div>
              <span style={{color:DS.textDim,fontSize:18}}>›</span>
            </div>
          </Card>
          <Card onClick={function(){setMode("step");setStep(0)}} style={{cursor:"pointer",padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:48,height:48,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:"rgba(255,255,255,0.04)",border:"1px solid "+DS.inputBorder}}>📝</div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:800,color:DS.textPrimary}}>항목별 입력</div>
                <div style={{fontSize:12,color:DS.textDim}}>제목, 설명, 해시태그 등 각각 입력</div>
              </div>
              <span style={{color:DS.textDim,fontSize:18}}>›</span>
            </div>
          </Card>
        </div>
      )}

      {mode !== null && !hasResults && !isError && !loading && <Steps steps={stepsArr} current={step} />}

      {/* Step 0: Paste mode */}
      {mode === "paste" && step === 0 && !hasResults && !isError && !loading && (
        <Card>
          <SH emoji="📋" title="정보 붙여넣기" right={<button onClick={function(){setMode(null)}} style={{background:"none",border:"none",color:DS.textDim,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>← 모드 선택</button>} />
          <div style={{background:DS.purpleBg,border:"1px solid "+DS.purpleBorder,borderRadius:10,padding:12,marginBottom:14}}>
            <div style={{fontSize:12,color:DS.purple,lineHeight:1.6}}>
              💡 어떤 언어든 OK! 제목·설명·해시태그·대본 등을 자유롭게 붙여넣으세요.<br/>
              AI가 자동 추출 → 현지화합니다.
            </div>
          </div>
          <Txa value={pasteText} onChange={function(v){setPasteText(v)}} placeholder={"콘텐츠 정보를 여기에 붙여넣으세요...\n\n🇰🇷 한국어 예시:\n제목: 50대 이후 반드시 끊어야 할 음식 5가지\n해시태그: #건강 #시니어건강\n\n🇺🇸 English 예시:\nTitle: 5 Foods You Must Quit After 50\nHashtags: #health #senior #diet"} rows={14} />
        </Card>
      )}

      {/* Step 0: Step mode */}
      {mode === "step" && step === 0 && !hasResults && !isError && !loading && (
        <Card>
          <SH emoji="📄" title="소스 콘텐츠 입력" right={<button onClick={function(){setMode(null)}} style={{background:"none",border:"none",color:DS.textDim,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>← 모드 선택</button>} />
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div><Lbl sub="필수">제목</Lbl><Inp value={source.title} onChange={function(v){updateSource("title",v)}} placeholder="어떤 언어든 입력 가능" /></div>
            <div><Lbl>설명글</Lbl><Txa value={source.description} onChange={function(v){updateSource("description",v)}} rows={3} /></div>
            <div><Lbl>해시태그</Lbl><Inp value={source.hashtags} onChange={function(v){updateSource("hashtags",v)}} /></div>
            <div><Lbl>썸네일 텍스트</Lbl><Inp value={source.thumbnailText} onChange={function(v){updateSource("thumbnailText",v)}} /></div>
            <div><Lbl sub={platform === "tiktok" ? "첫 1~3초" : "첫 15초"}>후킹 대사</Lbl><Txa value={source.hookScript} onChange={function(v){updateSource("hookScript",v)}} rows={2} /></div>
            <div><Lbl>SEO 키워드</Lbl><Inp value={source.keywords} onChange={function(v){updateSource("keywords",v)}} /></div>
            <div><Lbl>대본 요약</Lbl><Txa value={source.scriptSummary} onChange={function(v){updateSource("scriptSummary",v)}} rows={3} /></div>
          </div>
        </Card>
      )}

      {/* Step 1: Source Language */}
      {step === 1 && !hasResults && !isError && !loading && (
        <Card>
          <SH emoji="📤" title="원본 언어 선택" right={<Badge color="dim">1개 선택</Badge>} />
          <div style={{background:DS.purpleBg,border:"1px solid "+DS.purpleBorder,borderRadius:10,padding:10,marginBottom:14}}>
            <div style={{fontSize:12,color:DS.purple}}>입력한 콘텐츠가 어떤 언어로 작성되었나요?</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {LANGUAGES.map(function(lang) {
              var active = sourceLang === lang.code;
              return (
                <button key={lang.code} onClick={function(){handleSourceChange(lang.code)}} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "10px 12px",
                  borderRadius: 12, border: "1px solid", cursor: "pointer", fontFamily: "inherit",
                  background: active ? DS.purpleBg : "rgba(255,255,255,0.02)",
                  borderColor: active ? DS.purpleBorder : DS.inputBorder,
                  textAlign: "left",
                }}>
                  <span style={{ fontSize: 22 }}>{lang.flag}</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: active ? DS.purple : DS.textPrimary }}>{lang.name}</div>
                    <div style={{ fontSize: 11, color: DS.textDim }}>{lang.market}</div>
                  </div>
                  {active && <span style={{marginLeft:"auto",color:DS.purple,fontWeight:800}}>✓</span>}
                </button>
              );
            })}
          </div>
        </Card>
      )}

      {/* Step 2: Target Languages */}
      {step === 2 && !hasResults && !isError && !loading && (
        <Card>
          <SH emoji="📥" title="타겟 언어 선택" right={<Badge color="dim">최대 5개</Badge>} />
          <div style={{background:DS.purpleBg,border:"1px solid "+DS.purpleBorder,borderRadius:10,padding:10,marginBottom:14}}>
            <div style={{fontSize:12,color:DS.purple}}>{srcLangObj.flag} {srcLangObj.name}에서 → 어떤 언어로 현지화할까요?</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {targetLangs.map(function(lang) {
              var active = selectedLangs.includes(lang.code);
              return (
                <button key={lang.code} onClick={function(){toggleLang(lang.code)}} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "10px 12px",
                  borderRadius: 12, border: "1px solid", cursor: "pointer", fontFamily: "inherit",
                  background: active ? DS.purpleBg : "rgba(255,255,255,0.02)",
                  borderColor: active ? DS.purpleBorder : DS.inputBorder,
                  textAlign: "left",
                }}>
                  <span style={{ fontSize: 22 }}>{lang.flag}</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: active ? DS.purple : DS.textPrimary }}>{lang.name}</div>
                    <div style={{ fontSize: 11, color: DS.textDim }}>{lang.market}</div>
                  </div>
                </button>
              );
            })}
          </div>
          <div style={{ marginTop: 12, textAlign: "center" }}>
            <span style={{ fontSize: 12, color: DS.textDim }}>선택됨: {selectedLangs.length}/5</span>
          </div>
        </Card>
      )}

      {/* Step 3: Generate */}
      {step === 3 && !hasResults && !isError && !loading && (
        <Card style={{ textAlign: "center", padding: 40 }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🌏</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: DS.textPrimary, marginBottom: 8 }}>
            현지화 준비 완료
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
            <Badge color="purple">{srcLangObj.flag} {srcLangObj.name}</Badge>
            <span style={{color:DS.purple,fontWeight:800}}>→</span>
            {selectedLangs.map(function(code) {
              var l = LANGUAGES.find(function(la){return la.code===code});
              return l ? <Badge key={code} color="purple">{l.flag} {l.name}</Badge> : null;
            })}
          </div>
          <div style={{ color: DS.textDim, fontSize: 13, marginBottom: 20 }}>
            각 시장의 문화·트렌드에 맞는 현지화를 AI가 생성합니다
          </div>
          <Btn onClick={currentLocalize} variant="purple">🌏 AI 현지화 시작</Btn>
        </Card>
      )}

      {loading && <Spin text={selectedLangs.length + "개 언어로 현지화 중... (약 15~30초)"} />}

      {hasResults && (
        <div>
          {/* Direction indicator */}
          <div style={{textAlign:"center",marginBottom:12}}>
            <Badge color="purple">{dirLabel}</Badge>
          </div>

          <div style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
            {results.map(function(r, i) {
              return (
                <button key={i} onClick={function(){setActiveLang(i)}} style={{
                  padding: "8px 14px", borderRadius: 10, border: "1px solid",
                  background: activeLang === i ? DS.purpleBg : "rgba(255,255,255,0.02)",
                  borderColor: activeLang === i ? DS.purpleBorder : DS.inputBorder,
                  color: activeLang === i ? DS.purple : DS.textDim,
                  cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
                  fontSize: 13, fontWeight: 700,
                }}>
                  {r.flag} {r.langName}
                </button>
              );
            })}
          </div>

          <LangResult r={activeResult} platformName={p.name} />

          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <Btn onClick={resetAll} variant="secondary">새 콘텐츠</Btn>
            <Btn onClick={function(){ setResults(null); setStep(2); }} variant="secondary">언어 변경</Btn>
            <Btn onClick={currentLocalize} variant="purple">🔄 다시 생성</Btn>
          </div>
        </div>
      )}

      {isError && (
        <Card style={{ textAlign: "center", padding: 30 }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>{results === "nokey" ? "🔑" : "⚠️"}</div>
          <div style={{ color: "#ef4444", fontSize: 15, fontWeight: 700, marginBottom: 8 }}>
            {results === "nokey" ? "API 키가 등록되지 않았습니다" : "API 호출 중 오류가 발생했습니다"}
          </div>
          <div style={{ color: DS.textDim, fontSize: 13, marginBottom: 16, lineHeight: 1.6 }}>
            {results === "nokey"
              ? "홈 화면 > 🔑 Claude API 키 > 설정에서 키를 등록해 주세요"
              : "API 키가 올바른지 확인하고, 네트워크 연결을 점검해 주세요"}
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <Btn onClick={resetAll} variant="secondary">처음으로</Btn>
            {results !== "nokey" && <Btn onClick={function(){ setResults(null); setStep(3); }} variant="purple">다시 시도</Btn>}
          </div>
        </Card>
      )}

      {mode !== null && !hasResults && !isError && !loading && step < 3 && (
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
          <Btn onClick={function(){setStep(function(s){return s-1})}} variant="secondary" disabled={step === 0}>←</Btn>
          <Btn onClick={function(){setStep(function(s){return s+1})}} disabled={!canNext()} variant="purple">다음 →</Btn>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════ MAIN ═══════════════════════════════ */
function App() {
  const [page, setPage] = useState("home");
  const [platform, setPlatform] = useState("youtube");
  const [apiKey, setApiKey] = useState(function() {
    try { return window.localStorage.getItem("dodo_api_key") || (function(){try{var c=JSON.parse(window.localStorage.getItem('dodo-ws-api-keys')||'{}');return c.claude||''}catch(e){return''}}()) || ""; } catch(e) { return ""; }
  });

  var saveKey = function(key) {
    setApiKey(key);
    try { window.localStorage.setItem("dodo_api_key", key); } catch(e) {}
  };

  return (
    <div style={{ minHeight: "100vh", background: DS.bg, color: DS.textPrimary, fontFamily: "'Pretendard Variable','Pretendard',-apple-system,sans-serif" }}>
      <div style={{ position: "fixed", top: -100, left: "50%", transform: "translateX(-50%)", width: 500, height: 350, background: "radial-gradient(ellipse,rgba(245,180,50,0.06) 0%,transparent 70%)", pointerEvents: "none", zIndex: 0 }} />

      <div style={{ position: "relative", maxWidth: 520, margin: "0 auto", padding: "24px 16px 100px", zIndex: 1 }}>
        {page === "home" && <HomePage onNavigate={setPage} platform={platform} setPlatform={setPlatform} apiKey={apiKey} setApiKey={saveKey} />}
        {page === "dna" && <ChannelDNA onBack={() => setPage("home")} platform={platform} apiKey={apiKey} />}
        {page === "benchmark" && <Benchmark onBack={() => setPage("home")} platform={platform} apiKey={apiKey} />}
        {page === "checklist" && <Checklist onBack={() => setPage("home")} platform={platform} />}
        {page === "global" && <GlobalExpansion onBack={() => setPage("home")} platform={platform} apiKey={apiKey} />}
      </div>

      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 10, background: "rgba(13,13,15,0.92)", backdropFilter: "blur(20px)", borderTop: `1px solid ${DS.inputBorder}` }}>
        <div style={{ maxWidth: 520, margin: "0 auto", display: "flex" }}>
          {PHASES.map(ph => (
            <button key={ph.id} onClick={() => setPage(ph.id)} style={{ flex: 1, padding: "10px 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, background: "none", border: "none", cursor: "pointer", color: page === ph.id ? (ph.id === "global" ? DS.purple : DS.gold) : DS.textDim, fontFamily: "inherit" }}>
              <span style={{ fontSize: 18 }}>{ph.icon}</span>
              <span style={{ fontSize: 10, fontWeight: 700 }}>{ph.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
