function getHistory(){try{return JSON.parse(localStorage.getItem('dodo_history')||'[]')}catch(e){return[]}}
function saveHistory(h){try{localStorage.setItem('dodo_history',JSON.stringify(h))}catch(e){console.error('History save failed',e)}}
function addToHistory(result,productName,tones){
  const h=getHistory();
  h.unshift({id:Date.now(),date:new Date().toISOString(),productName:productName||'',tones:tones||[],result:result,fav:false});
  if(h.length>50)h.length=50; // max 50 records
  saveHistory(h);
}
function toggleFav(id){const h=getHistory();const item=h.find(x=>x.id===id);if(item)item.fav=!item.fav;saveHistory(h)}
function deleteHistory(id){const h=getHistory().filter(x=>x.id!==id);saveHistory(h)}
function clearAllHistory(){saveHistory([])}
function fmtDate(iso){const d=new Date(iso);const m=d.getMonth()+1,day=d.getDate(),h=d.getHours(),min=String(d.getMinutes()).padStart(2,'0');return`${m}/${day} ${h}:${min}`}
function extractJSON(text){if(!text)return null;let c=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();try{return JSON.parse(c)}catch(e){}let d=0,s=-1;for(let i=0;i<c.length;i++){if(c[i]==='{'){if(!d)s=i;d++}if(c[i]==='}'){d--;if(!d&&s>=0){try{return JSON.parse(c.substring(s,i+1))}catch(e){s=-1}}}}if(s>=0){let p=c.substring(s),ob=0,os=0;for(const ch of p){if(ch==='{')ob++;if(ch==='}')ob--;if(ch==='[')os++;if(ch===']')os--}while(os-->0)p+=']';while(ob-->0)p+='}';try{return JSON.parse(p)}catch(e){}}return null}
function getResp(d){let t='';(d.content||[]).forEach(b=>{if(b.type==='text')t+=b.text});return t}
async function readB64(f){return new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result.split(',')[1]);x.onerror=j;x.readAsDataURL(f)})}

// Compress image to max 1MB for API compatibility
async function compressImage(file,maxW=1200){
  return new Promise((resolve)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*(maxW/w));w=maxW}
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        // Try quality levels until under 1MB
        let quality=0.8;
        let dataUrl=canvas.toDataURL('image/jpeg',quality);
        while(dataUrl.length>1400000&&quality>0.3){quality-=0.1;dataUrl=canvas.toDataURL('image/jpeg',quality)}
        resolve({b64:dataUrl.split(',')[1],mediaType:'image/jpeg'});
      };
      img.onerror=()=>resolve(null);
      img.src=e.target.result;
    };
    reader.onerror=()=>resolve(null);
    reader.readAsDataURL(file);
  });
}
async function callAPI(sys,msgs,tools,timeout=120000){
  const body={model:'claude-sonnet-4-20250514',max_tokens:8000,system:sys,messages:msgs};
  if(tools?.length)body.tools=tools;
  try{
    const fetchP=fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify(body)
    });
    const timeoutP=new Promise((_,rej)=>setTimeout(()=>rej(new Error('⏰ 타임아웃('+Math.round(timeout/1000)+'초)')),timeout));
    const res=await Promise.race([fetchP,timeoutP]);
    if(!res.ok){
      let errMsg='HTTP '+res.status;
      try{const ebody=await res.text();const ej=JSON.parse(ebody);errMsg=ej?.error?.message||errMsg}catch(pe){try{errMsg=await res.text()}catch(te){}}
      throw new Error(errMsg);
    }
    const data=await res.json();
    console.log('[API OK]',data.usage);
    return data;
  }catch(e){
    console.error('[API ERR]',e);
    throw e;
  }
}

async function saveApiSetup(){
  const v=$('#apiSetupInput')?.value.trim();
  if(!v){showMsg('#apiSetupMsg','err','API 키를 입력해주세요');return}
  if(!v.startsWith('sk-')){showMsg('#apiSetupMsg','err','올바른 API 키 형식이 아닙니다 (sk-ant-api03-... 으로 시작)');return}
  
  const btn=$('#apiSetupSave');
  if(btn){btn.disabled=true;btn.querySelector('span').textContent='🔌 연결 확인 중…'}
  
  try{
    S.apiKey=v;
    await callAPI('Reply OK',[{role:'user',content:'ping'}],null,15000);
    localStorage.setItem('dodo_api_key',v);
    showMsg('#apiSetupMsg','ok','✓ API 연결 성공! 프로그램을 시작합니다…');
    setTimeout(()=>{S.step='input';render()},1200);
  }catch(e){
    S.apiKey='';
    showMsg('#apiSetupMsg','err','✗ 연결 실패: '+e.message+'<br><br>확인사항:<br>· 키가 정확히 복사되었는지<br>· 크레딧이 충전되어 있는지<br>· 키가 비활성화되지 않았는지');
    if(btn){btn.disabled=false;btn.querySelector('span').textContent='🔌 연결 확인 후 시작하기'}
  }
}

      ${(()=>{const selNames=S.selectedTones.map(id=>TONES.find(t=>t.id===id)?.name).filter(Boolean);const pairs=[];for(let i=0;i<selNames.length;i+=2)pairs.push(selNames.slice(i,i+2));return pairs.map((p,i)=>`<span style="padding:3px 8px;border-radius:5px;background:var(--inner);color:var(--orange);font-weight:600">${p.join(' + ')}</span>${i<pairs.length-1?'<span style="color:var(--t3)">+</span>':''}`).join('')})()}

  $('#searchInput')?.addEventListener('input',e=>S.searchQuery=e.target.value);
  // Translation buttons
  $$('.trans-btn').forEach(btn=>btn.addEventListener('click',async()=>{
    const q=$('#searchInput')?.value.trim();

    const lang=btn.dataset.lang;

    btn.disabled=true;btn.textContent='…';
    try{
      let prompt='';

        prompt=`다음 한국어 상품명/키워드를 영어, 중국어(간체), 일본어로 각각 번역해줘. 검색에 최적화된 자연스러운 표현으로. JSON만: {"en":"영어","zh":"中文","ja":"日本語"}\n\n${q}`;
      }else{

        prompt=`다음 한국어를 ${langName}로 번역해줘. 검색에 최적화된 자연스러운 표현으로. 번역 결과만 출력:\n\n${q}`;
      }

                <div style="display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:8px;background:var(--inner);border:1px solid var(--bdr-in)">

                  <span style="flex:1;color:var(--white);font-size:13px;font-weight:600">${esc(x.v||'')}</span>

          resEl.querySelectorAll('.trans-use').forEach(b=>b.addEventListener('click',()=>{

        showMsg('#transMsg','ok','✓ 번역 완료: '+clean);

  }));
  $('#searchAnalyze')?.addEventListener('click',async()=>{
    if(!S.searchQuery.trim()||!S.apiKey)return;

      const d=await callAPI(
        EXTRACT_P,
        [{role:'user',content:'다음 상품의 정보를 알려줘. 모르는 정보는 해당 카테고리 기준으로 추정해서 작성해. JSON만 출력해:\n\n상품: '+S.searchQuery}]
      );
      const i=extractJSON(getResp(d));
      if(!i)throw new Error('정보 추출 실패. 다른 상품명을 시도해보세요.');
      applyInfo(i);

  });
  const fi=$('#fileInput');$('#dropZone')?.addEventListener('click',()=>fi?.click());$('#removeImg')?.addEventListener('click',()=>{S.image=null;S.preview=null;render()});
  fi?.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;S.image=f;const r=new FileReader();r.onload=ev=>{S.preview=ev.target.result;render()};r.readAsDataURL(f)});
  $$('.field').forEach(el=>el.addEventListener('input',()=>S[el.dataset.f]=el.value));
  $$('.dur-btn').forEach(b=>b.addEventListener('click',()=>{syncDOM();S.dur=b.dataset.dur;render()}));

function applyInfo(info){if(!info){S.analyzing=false;render();setTimeout(()=>showMsg('#analyzeMsg','err','추출 실패'),50);return}const f=[];if(info.product_name){S.name=info.product_name;f.push('name')}if(info.price){S.price=info.price;f.push('price')}if(info.description){S.desc=info.description;f.push('desc')}if(info.target_audience){S.audience=info.target_audience;f.push('audience')}S.analyzing=false;render();setTimeout(()=>{if(f.length){showMsg('#analyzeMsg','ok','✓ '+f.length+'개!'+(info.product_name?' · '+info.product_name:''));hlFields(f)}else showMsg('#analyzeMsg','info','정보 없음')},50)}

/* ═══════════ GENERATE ═══════════ */
async function doGenerate(){
  syncDOM();if(!S.name.trim()){S.error='상품명 필요';render();return}if(!S.apiKey){S.error='API 키 필요';render();return}if(!S.selectedTones.length){S.error='말투를 1개 이상 선택';render();return}
  const selNames=S.selectedTones.map(id=>TONES.find(t=>t.id===id)?.name).filter(Boolean);
  const pairs=[];for(let i=0;i<selNames.length;i+=2)pairs.push(selNames.slice(i,i+2));
  S.error=null;S.cancelled=false;
  S.loadSteps=[{id:'a',label:'📊 상품 분석 + 썸네일 + 해시태그',status:'waiting',time:0}];
  pairs.forEach((p,i)=>S.loadSteps.push({id:'s'+i,label:'⭕ '+p.join(' + '),status:'waiting',time:0}));
  S.partialResult={scripts:[]};S.step='loading';render();

  // Prepare product image if exists
  let imgContent=[];
  if(S.image){
    try{
      const comp=await compressImage(S.image);
      if(comp){
        imgContent=[{type:'image',source:{type:'base64',media_type:comp.mediaType,data:comp.b64}}];
        console.log('[GEN] product image:',Math.round(comp.b64.length/1024)+'KB');
      }
    }catch(e){console.warn('Image compress failed',e)}
  }

  const infoText=`상품: ${S.name}\n${S.price?'가격: '+S.price+'\n':''}${S.desc?'설명: '+S.desc+'\n':''}${S.audience?'타겟: '+S.audience+'\n':''}길이: ${S.dur}`;
  // Build message with optional image
  function makeMsg(extraText){
    const content=[...imgContent,{type:'text',text:infoText+(extraText||'')+'\nJSON만.'}];
    return[{role:'user',content:imgContent.length?content:infoText+(extraText||'')+'\nJSON만.'}];
  }

  let tiv=setInterval(()=>{S.loadSteps.forEach(s=>{if(s.status==='active')s.time++});updateLoadUI()},1000);
  async function run(idx,fn){if(S.cancelled)throw new Error('취소');S.loadSteps[idx].status='active';updateLoadUI();try{const r=await fn();S.loadSteps[idx].status='done';updateLoadUI();return r}catch(e){S.loadSteps[idx].status='fail';updateLoadUI();throw e}}
  try{
    // Step 1: Analysis (with image)
    const r1=await run(0,async()=>{
      const d=await callAPI(ANALYSIS_P,makeMsg(imgContent.length?'\n첨부된 상품 이미지도 참고하여 분석해주세요.':''));
      const j=extractJSON(getResp(d));if(!j)throw new Error('분석 실패');return j;
    });
    S.partialResult.analysis=r1;

    // Step 2+: Scripts (with image for better prompts)
    for(let i=0;i<pairs.length;i++){
      const scripts=await run(i+1,async()=>{
        const d=await callAPI(scriptP(pairs[i]),makeMsg(imgContent.length?'\n첨부된 상품 이미지를 참고하여 image_prompt와 video_prompt를 더 정확하게 작성해주세요.':''));
        const j=extractJSON(getResp(d));if(!j?.scripts)throw new Error(pairs[i].join('+')+' 실패');return j.scripts;
      });
      S.partialResult.scripts.push(...scripts);
    }
    clearInterval(tiv);S.result={product_analysis:r1.product_analysis||{},scripts:S.partialResult.scripts,thumbnail_ideas:r1.thumbnail_ideas||[],hashtags:r1.hashtags||[]};S.viewingHistory=null;addToHistory(S.result,S.name,S.selectedTones);S.step='result';render();
  }catch(e){clearInterval(tiv);console.error(e);if(S.partialResult.analysis||S.partialResult.scripts.length){S.result={product_analysis:S.partialResult.analysis?.product_analysis||{},scripts:S.partialResult.scripts,thumbnail_ideas:S.partialResult.analysis?.thumbnail_ideas||[],hashtags:S.partialResult.analysis?.hashtags||[]};S.step='result';render();setTimeout(()=>{const w=document.createElement('div');w.className='msg-box info';w.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);max-width:400px;z-index:99';w.textContent='⚠ 부분 결과: '+e.message;document.body.appendChild(w);setTimeout(()=>w.remove(),6000)},100)}else{S.error=e.message;S.step='input';render()}}
}
function updateLoadUI(){S.loadSteps.forEach((s,i)=>{const el=$('#ls'+i);if(!el)return;el.className='load-step '+s.status;const ic=el.querySelector('.icon');if(s.status==='waiting')ic.textContent=i+1;else if(s.status==='active')ic.innerHTML='<span class="spinner" style="width:12px;height:12px;border-width:2px"></span>';else if(s.status==='done')ic.textContent='✓';else ic.textContent='✗';el.querySelector('.timer').textContent=s.time?s.time+'초':''})}
function renderLoading(a){a.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px"><h2 style="color:var(--orange);font-size:18px;font-weight:800;margin-bottom:6px">⭕ 비포/애프터 × 말투 대본 생성</h2><p style="color:var(--t3);font-size:12px;margin-bottom:20px">비포→체험→애프터, 말투만 다르게</p><div style="width:100%;max-width:420px">${S.loadSteps.map((s,i)=>`<div class="load-step ${s.status}" id="ls${i}"><div class="icon">${i+1}</div><div class="text">${s.label}</div><div class="timer"></div></div>`).join('')}</div><button class="btn-cancel" id="cancelBtn">✕ 취소</button></div>`;setTimeout(()=>$('#cancelBtn')?.addEventListener('click',()=>{S.cancelled=true;S.error='취소됨';S.step='input';render()}),0)}

    const bSB=(sc.scenes||[]).map(s=>{const sb=s.storyboard||{};return`[씬${s.scene_number}]\n구성: ${sb.composition}\n앵글: ${sb.camera_angle}\n무빙: ${sb.camera_movement}`}).join('\n\n');
    const bAud=(sc.scenes||[]).map(s=>{const au=s.audio||{};return`[씬${s.scene_number}]\nSFX: ${au.sfx}\nBGM: ${au.bgm_sync}`}).join('\n\n');
    h+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;padding:10px;border-radius:10px;background:var(--inner);border:1px solid var(--bdr-in)"><span style="color:var(--t3);font-size:11px;font-weight:600;display:flex;align-items:center;margin-right:4px">전체복사▸</span><button class="btn-amber sm copy-btn" style="color:var(--orange)" data-copy="${encodeURIComponent('['+sc.style+'] 대본\n\n'+bScript)}">🎙대본</button><button class="btn-amber sm copy-btn" style="color:var(--purple)" data-copy="${encodeURIComponent('['+sc.style+'] 스토리보드\n\n'+bSB)}">🎬보드</button><button class="btn-amber sm copy-btn" style="color:var(--cyan)" data-copy="${encodeURIComponent('['+sc.style+'] 이미지 프롬프트\n\n'+bImg)}">🖼️이미지</button><button class="btn-amber sm copy-btn" style="color:var(--green)" data-copy="${encodeURIComponent('['+sc.style+'] 영상 프롬프트\n\n'+bVid)}">📹영상</button><button class="btn-amber sm copy-btn" style="color:var(--pink)" data-copy="${encodeURIComponent('['+sc.style+'] 오디오\n\n'+bAud)}">🔊SFX</button></div>`;
    (sc.scenes||[]).forEach((sn,sni)=>{const sid='s'+si+'_'+sni;const sb=sn.storyboard||{};const ss=sn.script||{};const ip=sn.image_prompt||{};const vp=sn.video_prompt||{};const au=sn.audio||{};
      const hStage=sn.harmon_stage||HARMON[sni]||'';
      const toneInt=sn.tone_intensity||['80%','40%','50%','70%','40%','100%'][sni]||'';
      const intColors={'80%':'var(--orange)','40%':'var(--t3)','50%':'var(--amber-t)','60%':'var(--amber-t)','70%':'var(--cyan)','100%':'var(--green)'};
      const intColor=intColors[toneInt]||'var(--t3)';
      const cp=`[씬${sn.scene_number}] ${sn.duration} ${hStage}\n나레이션: ${ss.narration}\n자막: ${ss.screen_text}\n이미지: ${ip.prompt_en}\n영상: ${vp.prompt_en}`;
      h+=`<div class="scene-card"><div class="scene-hdr"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><div class="scene-num">${sn.scene_number}</div><span style="color:var(--t2);font-size:11px;font-family:var(--mono)">${sn.duration||''}</span><span style="font-size:10px;color:var(--purple);background:var(--purple-d);padding:2px 6px;border-radius:4px;font-weight:600">${hStage}</span><span style="font-size:9px;color:${intColor};background:var(--inner);padding:2px 6px;border-radius:4px;font-weight:700;font-family:var(--mono)">톤${toneInt}</span></div><button class="btn-amber sm copy-btn" data-copy="${encodeURIComponent(cp)}">복사</button></div>`;
      h+=`<div class="scene-tabs">${[{id:'script',l:'🎙대본'},{id:'sb',l:'🎬보드'},{id:'img',l:'🖼️이미지'},{id:'vid',l:'📹영상'},{id:'aud',l:'🔊SFX'}].map((t,ti)=>`<button class="scene-tab ${ti===0?'active':''}" data-sid="${sid}" data-tab="${t.id}">${t.l}</button>`).join('')}</div><div class="scene-body">`;
      h+=`<div class="tp" data-sid="${sid}" data-tab="script"><div class="mb-10"><div class="lbl" style="color:var(--orange)">나레이션</div><p style="color:var(--white);font-size:13px;line-height:1.7">${ss.narration||''}</p></div><div class="mb-10"><div class="lbl" style="color:var(--blue)">자막</div><div style="padding:6px 10px;border-radius:7px;background:var(--blue-d);color:var(--blue);font-size:12px;font-weight:600">${ss.screen_text||''}</div></div><div class="grid-2"><div><div class="lbl" style="color:var(--purple)">효과</div><p style="color:var(--t2);font-size:11px">${ss.text_animation||''}</p></div><div><div class="lbl" style="color:var(--pink)">톤</div><p style="color:var(--t2);font-size:11px">${ss.voice_tone||''}</p></div></div></div>`;
      h+=`<div class="tp hidden" data-sid="${sid}" data-tab="sb"><div class="mb-10"><div class="lbl" style="color:var(--purple)">구성</div><p style="font-size:12px;line-height:1.6">${sb.composition||''}</p></div><div class="grid-2"><div style="background:#0A0A0C;border-radius:7px;padding:8px"><div class="lbl" style="color:var(--cyan)">앵글</div><p style="font-size:11px">${sb.camera_angle||''}</p></div><div style="background:#0A0A0C;border-radius:7px;padding:8px"><div class="lbl" style="color:var(--green)">무빙</div><p style="font-size:11px">${sb.camera_movement||''}</p></div></div></div>`;
      h+=`<div class="tp hidden" data-sid="${sid}" data-tab="img"><div class="prompt-block" style="border:1px solid rgba(34,211,238,.1)"><div class="prompt-block-hdr" style="background:rgba(34,211,238,.04)"><div class="label"><span style="color:var(--cyan)">IMAGE</span><span class="lang">EN</span></div><button class="prompt-copy copy-btn" data-copy="${encodeURIComponent(ip.prompt_en||'')}">복사</button></div><div class="prompt-block-body">${ip.prompt_en||''}</div></div></div>`;
      h+=`<div class="tp hidden" data-sid="${sid}" data-tab="vid"><div class="prompt-block" style="border:1px solid rgba(74,222,128,.1)"><div class="prompt-block-hdr" style="background:rgba(74,222,128,.04)"><div class="label"><span style="color:var(--green)">VIDEO</span><span class="lang">EN</span></div><button class="prompt-copy copy-btn" data-copy="${encodeURIComponent(vp.prompt_en||'')}">복사</button></div><div class="prompt-block-body">${vp.prompt_en||''}</div></div></div>`;
      h+=`<div class="tp hidden" data-sid="${sid}" data-tab="aud"><div class="mb-10"><div class="lbl" style="color:var(--pink)">SFX</div><p style="font-size:12px">${au.sfx||''}</p></div><div><div class="lbl" style="color:var(--amber-t)">BGM</div><p style="font-size:12px">${au.bgm_sync||''}</p></div></div>`;
      h+=`</div></div>`;});
    h+=`<div class="grid-2 mb-10"><div class="inner-box"><div class="lbl" style="color:var(--rose)">🎵BGM</div><p style="font-size:12px">${sc.bgm_mood||''}</p></div><div class="inner-box"><div class="lbl" style="color:var(--blue)">✂️편집</div><p style="font-size:12px">${sc.editing_tips||''}</p></div></div>`;
    const fcp=(sc.scenes||[]).map(s=>`[씬${s.scene_number}] ${s.harmon_stage||HARMON[s.scene_number-1]||''}\n나레이션: ${(s.script||{}).narration}\n자막: ${(s.script||{}).screen_text}\n이미지: ${(s.image_prompt||{}).prompt_en}\n영상: ${(s.video_prompt||{}).prompt_en}`).join('\n\n');
    h+=`<button class="btn-amber copy-btn" data-copy="${encodeURIComponent('['+sc.style+']\nHOOK: '+sc.hook+'\n\n'+fcp)}">전체 복사</button></div></div>`;});
  h+=`</div>`;
  if(thumbs.length){h+=`<div class="card"><div class="card-hdr"><div class="card-hdr-left"><span class="emoji">🖼️</span><span class="title">썸네일</span></div></div>`;thumbs.forEach((t,i)=>{h+=`<div class="inner-box mb-10"><span class="tag" style="color:var(--orange);background:var(--orange-d)">컨셉 ${i+1}</span><p style="color:var(--white);font-size:14px;font-weight:700;margin:6px 0 3px">${t.main_text||''}</p><p style="color:var(--t2);font-size:11px;margin-bottom:6px">${t.sub_text||''}</p>`;if(t.image_prompt_en)h+=`<div class="prompt-block" style="border:1px solid rgba(34,211,238,.1)"><div class="prompt-block-hdr" style="background:rgba(34,211,238,.04)"><div class="label"><span style="color:var(--cyan)">THUMB</span><span class="lang">EN</span></div><button class="prompt-copy copy-btn" data-copy="${encodeURIComponent(t.image_prompt_en)}">복사</button></div><div class="prompt-block-body">${t.image_prompt_en}</div></div>`;h+=`</div>`});h+=`</div>`}
  if(tags.length){h+=`<div class="card" style="margin-bottom:40px"><div class="card-hdr"><div class="card-hdr-left"><span class="emoji">#️⃣</span><span class="title">해시태그</span></div><button class="btn-amber sm copy-btn" data-copy="${encodeURIComponent(tags.map(t=>'#'+t).join(' '))}">전체</button></div><div class="inner-box" style="display:flex;flex-wrap:wrap;gap:6px">${tags.map(t=>`<span class="hashtag" data-tag="${t}">#${t}</span>`).join('')}</div></div>`}
  h+=`</div>`;a.innerHTML=h;
  setTimeout(()=>{
    $('#resetBtn')?.addEventListener('click',()=>{S.step='input';S.result=null;S.viewingHistory=null;render()});
    $('#histFromResult')?.addEventListener('click',()=>{S.step='history';render()});
    $('#favToggle')?.addEventListener('click',()=>{if(S.viewingHistory){toggleFav(S.viewingHistory);render()}});
    $$('[data-toggle]').forEach(el=>el.addEventListener('click',()=>{const x=$('#'+el.dataset.toggle);x.classList.toggle('open');el.querySelector('svg').style.transform=x.classList.contains('open')?'rotate(180deg)':'rotate(0)'}));
    $$('.scene-tab').forEach(tab=>tab.addEventListener('click',()=>{const sid=tab.dataset.sid,tid=tab.dataset.tab;$$('.scene-tab[data-sid="'+sid+'"]').forEach(t=>{t.classList.remove('active');t.style.color='';t.style.background=''});tab.classList.add('active');const cm={script:'var(--orange)',sb:'var(--purple)',img:'var(--cyan)',vid:'var(--green)',aud:'var(--pink)'};tab.style.color=cm[tid]||'';$$('.tp[data-sid="'+sid+'"]').forEach(p=>p.classList.add('hidden'));$('.tp[data-sid="'+sid+'"][data-tab="'+tid+'"]')?.classList.remove('hidden')}));
    $$('.copy-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();copyText(decodeURIComponent(b.dataset.copy),b)}));
    $$('.hashtag').forEach(el=>el.addEventListener('click',()=>{navigator.clipboard.writeText('#'+el.dataset.tag);el.style.color='var(--green)';setTimeout(()=>el.style.color='',1000)}));
  },50);
}
render();
</script>
</body>
</html>
