<head>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;background:#111116;color:#e0ddd8;min-height:100vh}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3a3a44;border-radius:3px}input::placeholder,textarea::placeholder{color:#8a8a94!important;opacity:1}input:focus,textarea:focus{border-color:#d4941e!important;box-shadow:0 0 0 3px rgba(212,148,30,0.07)!important;outline:none}button{font-family:inherit;cursor:pointer;border:none;background:none}
@keyframes pulseGlow{0%,100%{opacity:.6}50%{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}@keyframes eqBar{0%,100%{height:3px}50%{height:16px}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes copyFlash{0%{background:rgba(212,148,30,0.15)}100%{background:transparent}}
.app{max-width:780px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}.ambient{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(212,148,30,0.04) 0%,transparent 70%);pointer-events:none}
.header{position:sticky;top:0;z-index:20;background:rgba(17,17,22,0.92);backdrop-filter:blur(24px);border-bottom:1px solid #1e1e26}.header-top{display:flex;align-items:center;gap:14px;padding:16px 24px 8px}.knob{width:42px;height:42px;border-radius:50%;background:conic-gradient(from 220deg,#111116,#1e1e26,#3a3a44,#1e1e26,#111116);border:2px solid #2a2a34;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(212,148,30,0.08),inset 0 0 12px rgba(0,0,0,0.6);flex-shrink:0;position:relative}.knob-inner{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#d4941e,#6a4810)}.knob-line{position:absolute;top:3px;left:50%;transform:translateX(-50%);width:2px;height:5px;background:#e8a030;border-radius:1px;opacity:0.7}
.brand h1{margin:0;font-size:20px;font-weight:800;background:linear-gradient(135deg,#f0c040,#e8a030);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.pro-badge{font-size:10px;font-weight:800;padding:3px 8px;background:#d4941e18;border:1px solid #d4941e28;border-radius:3px;color:#d4941e;letter-spacing:1.8px;margin-left:8px}
.eq-bars{display:flex;align-items:flex-end;gap:2px;height:18px}.eq-bar{width:2.5px;border-radius:1.5px;background:#3a3a44;height:3px}.eq-bar.active{background:linear-gradient(180deg,#e8a030,#d4941e)}
.tabs{display:flex;padding:0 24px;margin-top:6px}.tab{flex:1;padding:10px 0 12px;font-size:12px;font-weight:700;letter-spacing:2px;color:#a0a0ae;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s}.tab.active{background:linear-gradient(180deg,#18182a,#0e0e16);color:#e8a030;border-bottom-color:#d4941e}.tab.disabled{opacity:0.4;cursor:default}.tab-key{font-size:10px;font-weight:800;padding:2px 5px;border:1px solid #3a3a4433;border-radius:2px;color:#8a8a94}.tab.active .tab-key{border-color:#d4941e44;color:#d4941e88}.tab-badge{font-size:10px;font-weight:700;color:#111116;background:#d4941e;border-radius:8px;padding:0 6px}
.api-bar{padding:12px 24px;background:rgba(24,24,32,0.6);border-bottom:1px solid #1e1e26;display:flex;align-items:center;gap:10px}.api-bar label{font-size:10px;font-weight:700;color:#d4941e;letter-spacing:1px;flex-shrink:0}.api-bar input{flex:1;padding:7px 12px;background:rgba(16,16,22,0.9);border:1px solid #2a2a34;border-radius:6px;color:#f0ece8;font-size:12px;font-family:monospace}.api-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0}.api-status.ok{color:#4dba6a;background:rgba(77,186,106,0.08);border:1px solid rgba(77,186,106,0.2)}.api-status.no{color:#a07060;background:rgba(160,112,96,0.08);border:1px solid rgba(160,112,96,0.15)}
.body{flex:1;padding:14px 24px 24px;animation:fadeIn 0.25s ease}.error{margin:12px 24px;padding:11px 16px;background:rgba(180,60,40,0.08);border:1px solid rgba(180,60,40,0.2);border-radius:7px;color:#f0887a;font-size:12px;display:flex;align-items:center;gap:10px}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:12px}.sh-num{font-size:12px;font-weight:800;color:#e8a030;letter-spacing:2px;min-width:22px}.sh-title{font-size:15px;font-weight:700;color:#f0ece8}.sh-req{font-size:10px;font-weight:700;color:#e8705a;background:#e8705a14;padding:3px 8px;border-radius:3px}.sh-tag{font-size:10px;font-weight:600;color:#c0c0cc;background:#2a2a34;padding:3px 8px;border-radius:3px}.sh-line{flex:1;height:1px;background:linear-gradient(90deg,#2a2a34,transparent)}
.preset-grid{display:grid;gap:6px;padding-left:32px}.preset-grid.len{grid-template-columns:repeat(4,1fr)}.preset-grid.con{grid-template-columns:repeat(3,1fr)}.preset-grid.sty{grid-template-columns:repeat(2,1fr)}.preset-btn{padding:10px 8px;border:1px solid #2a2a34;border-radius:8px;background:rgba(22,22,30,0.7);display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.2s}.preset-btn.active{border-color:#d4941e55;background:rgba(212,148,30,0.1);box-shadow:0 0 12px rgba(212,148,30,0.08)}.preset-btn .icon{font-size:20px}.preset-btn .name{font-size:12px;font-weight:700;color:#d0d0da}.preset-btn.active .name{color:#e8a030}.preset-btn .desc{font-size:10px;color:#8a8a94;text-align:center;line-height:1.4}.preset-btn.active .desc{color:#c8b080}.style-palette{display:flex;gap:3px;margin-top:3px}.style-palette span{width:14px;height:7px;border-radius:2px}
.mode-toggle{display:flex;margin-bottom:16px;background:rgba(24,24,32,0.6);border:1px solid #2a2a34;border-radius:8px;overflow:hidden}.mode-btn{flex:1;padding:12px;font-size:13px;font-weight:700;color:#c0c0cc;border-bottom:2px solid transparent}.mode-btn.active{background:rgba(212,148,30,0.08);border-bottom-color:#d4941e;color:#e8a030}
.field-input{flex:1;padding:10px 14px;background:rgba(22,22,30,0.9);border:1px solid #2a2a34;border-radius:7px;color:#f0ece8;font-size:14px;font-weight:500;font-family:inherit}.field-ta{width:100%;padding:12px 14px;background:rgba(22,22,30,0.9);border:1px solid #2a2a34;border-radius:7px;color:#f0ece8;font-size:14px;font-weight:500;font-family:inherit;resize:vertical;line-height:1.8}.num-badge{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;border:1px solid #3a3a44;background:rgba(30,26,18,0.8);color:#a0a0ae}.num-badge.on{border-color:#d4941e44;background:rgba(212,148,30,0.12);color:#e8a030}.row{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding-left:32px}
.ref-box{margin-bottom:20px;padding:14px 16px;background:rgba(24,24,32,0.5);border:1px solid #2a2a34;border-radius:10px}
.action-bar{display:flex;gap:8px;padding:14px 16px;background:rgba(24,24,32,0.5);border:1px solid #2a2a34;border-radius:10px}.btn-reset{padding:12px 18px;border:1px solid #3a3a44;border-radius:7px;color:#b0b0be;font-size:12px;font-weight:700}.btn-submit{flex:1;padding:12px 20px;border-radius:7px;font-size:13px;font-weight:800;letter-spacing:1px;transition:all 0.3s}.btn-submit.on{background:linear-gradient(135deg,#d4941e,#b07818);color:#111116;box-shadow:0 4px 20px rgba(212,148,30,0.15)}.btn-submit.off{background:#1e1e26;color:#6a6a78;cursor:not-allowed}
/* Step 2 button */
.btn-step2{width:100%;padding:14px;border-radius:8px;font-size:13px;font-weight:800;letter-spacing:1px;transition:all 0.3s;margin-top:16px;background:linear-gradient(135deg,#4a8c5c,#357a45);color:#fff;box-shadow:0 4px 20px rgba(74,140,92,0.2)}.btn-step2:hover{box-shadow:0 4px 24px rgba(74,140,92,0.3)}.btn-step2.off{background:#1e1e26;color:#6a6a78;cursor:not-allowed;box-shadow:none}
/* Step indicator */
.step-indicator{display:flex;gap:0;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid #2a2a34}.step-ind{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:700;letter-spacing:0.5px;transition:all 0.3s;position:relative}.step-ind.done{background:rgba(212,148,30,0.08);color:#e8a030;border-right:1px solid #2a2a34}.step-ind.active{background:rgba(212,148,30,0.15);color:#e8a030}.step-ind.waiting{background:rgba(24,24,32,0.5);color:#8a8a94}.step-ind .step-label{font-size:10px;color:#8a8a94;display:block;margin-top:2px}.step-ind.done .step-label,.step-ind.active .step-label{color:#a09058}
.result-card{background:rgba(20,20,28,0.6);border:1px solid #2a2a34;border-radius:10px;padding:22px 20px;line-height:1.9}
.section-card{margin-bottom:12px;border-radius:10px;border:1px solid #2a2a34;background:rgba(20,20,28,0.5);overflow:hidden;transition:all 0.3s}
.section-card.flash{animation:copyFlash 0.6s ease}
.section-bar{height:3px;border-radius:3px 3px 0 0}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 18px 8px;flex-wrap:wrap}
.section-head h2{font-size:16px;font-weight:800;color:#f5f0ea;margin:0;flex:1;display:flex;align-items:center;gap:8px}
.section-head .sec-icon{font-size:16px;flex-shrink:0}
.section-head .sec-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:0.5px;flex-shrink:0}
.section-copy-btn{padding:6px 14px;border:1px solid #2a2a34;border-radius:6px;background:transparent;color:#a0a0ae;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all 0.2s;white-space:nowrap}
.section-copy-btn:hover{border-color:#d4941e44;color:#d0d0da;background:rgba(212,148,30,0.04)}
.section-copy-btn.copied{color:#e8a030;border-color:#d4941e44;background:rgba(212,148,30,0.06)}
.section-body{padding:4px 18px 16px;line-height:1.9}
.section-divider{height:1px;background:#2a2a34;margin:0}
.result-card h1,.section-body h1{font-size:20px;font-weight:900;color:#fff;margin:28px 0 14px;padding-bottom:12px;border-bottom:1px solid #2a2a34}.result-card h3,.section-body h3{font-size:15px;font-weight:700;color:#e8a030;margin:22px 0 8px}.result-card h4,.section-body h4{font-size:14px;font-weight:700;color:#d0a850;margin:18px 0 6px}.result-card p,.section-body p{margin:3px 0;font-size:14px;color:#e0ddd8;line-height:1.9}.result-card .li,.section-body .li{display:flex;gap:10px;margin:3px 0;font-size:14px;color:#e0ddd8;line-height:1.85;padding-left:4px}.result-card .bullet,.section-body .bullet{color:#d4941e;font-weight:700;flex-shrink:0;font-size:10px;margin-top:5px}.result-card strong,.section-body strong{color:#fff;font-weight:700}.result-card hr,.section-body hr{border:none;border-top:1px solid #2a2a34;margin:20px 0}
.progress-wrap{padding:36px 0;text-align:center}.progress-bar{width:100%;height:2px;background:#1e1e26;border-radius:1px;overflow:hidden;margin-bottom:24px}.progress-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,#d4941e,#e8a030,#d4941e);background-size:200% 100%;animation:shimmer 1.8s linear infinite;transition:width 0.5s ease}.stage-badge{display:inline-flex;align-items:center;gap:10px;padding:9px 18px;background:rgba(24,24,32,0.6);border:1px solid #2a2a34;border-radius:7px}.stage-icon{color:#d4941e;font-size:14px;animation:pulseGlow 1.5s ease infinite}
.hist-item{padding:14px 16px;background:rgba(24,24,32,0.5);border:1px solid #2a2a34;border-radius:10px;cursor:pointer;margin-bottom:8px}.hist-item:hover{background:rgba(25,22,14,0.6)}.hist-title{font-size:14px;font-weight:700;color:#f0ece8;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.hist-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px}.hist-tag{font-size:10px;padding:2px 8px;border-radius:3px}.hist-preview{font-size:12px;color:#a0a0ae;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.btn-sm{padding:6px 12px;border:1px solid #2a2a34;border-radius:5px;font-size:11px;font-weight:700;color:#a0a0ae}.btn-sm.danger{border-color:#3a2020;color:#a07060}.btn-sm.gold{border-color:#d4941e44;background:rgba(212,148,30,0.08);color:#e8a030}
.img-upload-zone{margin-left:32px;display:flex;gap:10px;flex-wrap:wrap}.img-upload-box{width:90px;height:90px;border:1px dashed #2a2a34;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;background:rgba(22,22,30,0.7)}.img-upload-box:hover{border-color:#d4941e44}.img-upload-box.filled{border-style:solid;border-color:#d4941e33}.img-upload-box img{width:100%;height:100%;object-fit:cover;border-radius:7px}.img-upload-box .placeholder{font-size:24px;color:#3a3a44}.img-upload-box .remove{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(17,17,22,0.8);color:#f0887a;font-size:10px;display:flex;align-items:center;justify-content:center;border:1px solid #3a2020;opacity:0}.img-upload-box:hover .remove{opacity:1}.img-upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer}
.footer{padding:14px 24px;text-align:center;border-top:1px solid #1e1e26;font-size:10px;color:#8a8a94;letter-spacing:1px;font-weight:600}.hidden{display:none!important}
/* Lock Screen */
.lock-screen{position:fixed;inset:0;background:#111116;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
.lock-box{width:340px;padding:40px 32px;background:rgba(20,20,28,0.8);border:1px solid #2a2a34;border-radius:16px;text-align:center;backdrop-filter:blur(24px)}
.lock-knob{width:64px;height:64px;border-radius:50%;background:conic-gradient(from 220deg,#111116,#1e1e26,#3a3a44,#1e1e26,#111116);border:2px solid #2a2a34;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 32px rgba(212,148,30,0.1),inset 0 0 16px rgba(0,0,0,0.6)}
.lock-knob-inner{width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#d4941e,#6a4810)}
.lock-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,#f0c040,#e8a030);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.lock-sub{font-size:13px;color:#a0a0ae;margin-bottom:24px}
.lock-input{width:100%;padding:14px;background:rgba(16,16,22,0.9);border:1px solid #2a2a34;border-radius:10px;color:#f0ece8;font-size:20px;font-weight:700;text-align:center;letter-spacing:12px;font-family:inherit;outline:none;transition:border-color 0.3s}
.lock-input:focus{border-color:#d4941e;box-shadow:0 0 0 3px rgba(212,148,30,0.07)}
.lock-input.error{border-color:#a03030;animation:lockShake 0.4s ease}
.lock-btn{width:100%;padding:13px;margin-top:14px;background:linear-gradient(135deg,#d4941e,#b07818);color:#111116;font-size:13px;font-weight:800;border:none;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.3s;box-shadow:0 4px 20px rgba(212,148,30,0.15)}
.lock-btn:hover{box-shadow:0 4px 28px rgba(212,148,30,0.25)}
.lock-error-msg{font-size:11px;color:#f0887a;margin-top:10px;min-height:16px}
@keyframes lockShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
</style>
</head>
<body>
<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-knob"><div class="lock-knob-inner"></div></div>
    <div style="display:inline-block;padding:5px 16px;background:rgba(212,148,30,0.08);border:1px solid rgba(212,148,30,0.15);border-radius:20px;font-size:11px;font-weight:700;color:#e8a030;margin-bottom:14px;letter-spacing:0.5px">🎬 DODO · 스크립트AI스튜디오</div>
    <div class="lock-title">🎬 스크립트AI스튜디오 -DODO</div>
    <div class="lock-sub">비밀번호를 입력하세요</div>
    <input type="password" class="lock-input" id="lockInput" maxlength="10" placeholder="····" autofocus>
    <button class="lock-btn" id="lockBtn" onclick="checkPassword()">잠금 해제</button>
    <div class="lock-error-msg" id="lockError"></div>
  </div>
</div>
<!-- MAIN APP (hidden until unlock) -->
<div class="app hidden" id="mainApp">
  <div class="ambient"></div>
  <div class="header"><div class="header-top"><div class="knob"><div class="knob-inner"></div><div class="knob-line"></div></div><div style="flex:1"><div style="display:flex;align-items:center"><div class="brand"><h1>🎬 스크립트AI스튜디오 -DODO</h1></div><span class="pro-badge">PRO v5</span></div><p style="font-size:12px;color:#a0a0ae;margin-top:2px">5단계 생성: 대본 → 스토리보드 → 이미지 → 영상 → 업로드</p></div><div class="eq-bars" id="eqBars"></div></div><div class="tabs" id="tabs"></div></div>
  <!-- API KEY: Collapsed bar (default) -->
  <div class="api-bar" id="apiBarCollapsed" style="justify-content:space-between">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:14px">🔑</span>
      <span style="font-size:13px;font-weight:700;color:#f0ece8">Claude API 키</span>
      <span class="api-status no" id="apiStatusCollapsed">미입력</span>
    </div>
    <button onclick="openApiSettings()" style="padding:5px 14px;background:rgba(212,148,30,0.08);border:1px solid #d4941e33;border-radius:6px;color:#e8a030;font-size:11px;font-weight:700">설정</button>
  </div>
  <!-- API KEY: Expanded panel (hidden by default) -->
  <div class="hidden" id="apiBarExpanded" style="padding:16px 24px;background:rgba(24,24,32,0.8);border-bottom:1px solid #1e1e26">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:14px">🔑</span>
        <span style="font-size:13px;font-weight:700;color:#f0ece8">Claude API 키 설정</span>
      </div>
      <button onclick="closeApiSettings()" style="color:#8a8a94;font-size:10px;font-weight:700;padding:4px 10px;border:1px solid #2a2a34;border-radius:4px">닫기</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." spellcheck="false" autocomplete="off" style="flex:1;padding:9px 14px;background:rgba(16,16,22,0.9);border:1px solid #2a2a34;border-radius:7px;color:#f0ece8;font-size:12px;font-family:monospace">
      <button onclick="toggleKeyVis()" style="color:#8a8a94;font-size:10px;font-weight:700;padding:6px 10px;border:1px solid #2a2a34;border-radius:5px" id="toggleKeyBtn">보기</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#a0a0ae;font-weight:600"><input type="checkbox" id="saveKeyToggle" style="accent-color:#d4941e;width:13px;height:13px"> 키 저장</label>
      <button onclick="disconnectKey()" style="color:#f0887a;font-size:10px;font-weight:700;padding:4px 10px;border:1px solid #3a2020;border-radius:5px;background:rgba(160,48,48,0.06)" id="disconnectBtn" class="hidden">연결 해제</button>
      <span class="api-status no" id="apiStatus" style="margin-left:auto">미입력</span>
    </div>
    <div id="securityNotice" style="font-size:10px;color:#8a8a94;margin-top:8px;line-height:1.5" class="hidden"></div>
    <div style="margin-top:10px;padding:8px 12px;background:rgba(212,148,30,0.03);border:1px solid #2a2a3433;border-radius:6px;font-size:10px;color:#8a8a94;line-height:1.5">
      API 키 발급: <a href="https://console.anthropic.com" target="_blank" style="color:#d4941e;text-decoration:none">console.anthropic.com</a> → API Keys → Create Key
    </div>

function autoParse(raw){const r={titles:["","","","",""],thumbnails:["","",""],description:"",intro:"",script:""};if(!raw.trim())return{parsed:r};const lines=raw.split("\n").map(l=>l.trim()).filter(Boolean);const sp=[{k:"titles",p:[/^#{0,3}\s*제목/i]},{k:"thumbnails",p:[/^#{0,3}\s*썸네일/i]},{k:"description",p:[/^#{0,3}\s*설명글/i,/^영상\s*설명/i]},{k:"intro",p:[/^#{0,3}\s*인트로/i]},{k:"script",p:[/^#{0,3}\s*스크립트/i,/^#{0,3}\s*대본/i,/^원본/i]}];const secs=[];let cur=null,cl=[];for(const line of lines){let m=false;for(const s of sp){if(s.p.some(p=>p.test(line))){if(cur)secs.push({k:cur,l:[...cl]});cur=s.k;cl=[];m=true;break;}}if(!m&&cur)cl.push(line);}if(cur)secs.push({k:cur,l:[...cl]});if(!secs.length){const num=lines.filter(l=>/^\d+[\.\)]\s*/.test(l));if(num.length>=2){num.slice(0,5).forEach((l,i)=>{r.titles[i]=l.replace(/^\d+[\.\)]\s*/,"").trim();});const rem=lines.filter(l=>!num.includes(l)).join("\n");if(rem.length>50)r.script=rem;}else r.script=lines.join("\n");return{parsed:r};}for(const sec of secs){const c=sec.l;if(sec.k==="titles")c.forEach((l,i)=>{if(i<5)r.titles[i]=l.replace(/^\d+[\.\)\-]\s*/,"").replace(/^[•·▸►→]\s*/,"").trim();});else if(sec.k==="thumbnails")c.forEach((l,i)=>{if(i<3)r.thumbnails[i]=l.replace(/^\d+[\.\)\-]\s*/,"").replace(/^[•·▸►→]\s*/,"").trim();});else if(sec.k==="description")r.description=c.join("\n");else if(sec.k==="intro")r.intro=c.join("\n");else if(sec.k==="script")r.script=c.join("\n");}return{parsed:r};}

  const lines=raw.split("\n");const results=[];let capture=false;let buf=[];

    if(line.match(pattern)){capture=true;buf=[line];continue;}
    if(capture){
      if(line.startsWith("- ")||line.startsWith("**[")||line.match(/^#{2,4}\s/)||line.startsWith("🖼️")||line.startsWith("🎥")||line.startsWith("📋")||line.startsWith("🏷️")){

        if(line.match(pattern)){buf=[line];continue;}

function extractImagePrompts(raw){return extractFromRaw(raw,/🖼️.*이미지|Image Prompt|이미지 프롬프트/);}

function extractScriptOnly(raw){
  const lines=raw.split("\n");let inScript=false;const buf=[];
  for(const line of lines){
    // Start capturing when we find the script section
    if(line.match(/^#{2,3}\s.*재창작\s*대본|^#{2,3}\s.*🎬.*대본|^#{2,3}\s.*제공된?\s*대본/)){inScript=true;continue;}
    // Stop when we hit a new major section (## or ###) that isn't part of the script
    if(inScript&&line.match(/^#{2,3}\s/)&&(line.match(/공감|체크|가이드|캐릭터|스토리보드|이미지|영상|업로드|분석|하몬|💗|✅|👤|🎞️|🖼️|🎥|📋|📊|🔄/))){break;}
    if(inScript)buf.push(line);
  }
  // Remove leading/trailing empty lines, but keep the script content
  let result=buf.join("\n").trim();
  // If extraction failed, try finding content between [인트로] and last section
  if(!result){
    let start=-1,end=lines.length;
    for(let i=0;i<lines.length;i++){
      if(lines[i].match(/\[인트로|인트로\s*-|인트로\]/i)&&start<0)start=i;
      if(start>=0&&lines[i].match(/^#{2,3}\s.*(공감|체크|가이드|💗|✅)/))  {end=i;break;}
    }
    if(start>=0)result=lines.slice(start,end).join("\n").trim();
  }
  return result;
}

    card.innerHTML=`<div class="hist-title" style="padding-right:36px">${esc(item.title)}</div><div class="hist-meta"><span class="hist-tag" style="color:#d4941e;background:rgba(212,148,30,0.08)">${esc(item.style||"")}</span>${item.isAsis?'<span class="hist-tag" style="color:#4dba6a;background:rgba(77,186,106,0.08)">그대로</span>':''}<span class="hist-tag" style="color:${stepColors[Math.min(ms-1,4)]};background:${stepColors[Math.min(ms-1,4)]}15">${stepLabel}</span><span style="font-size:10px;color:#8a8a94">${fmtDate(item.date)}</span></div>`;
    const del=document.createElement("button");
    del.style.cssText="position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:8px;border:1px solid rgba(240,136,122,0.12);background:rgba(30,20,20,0.6);color:#f0887a;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.25s;font-family:inherit;backdrop-filter:blur(8px)";
    del.innerHTML="✕";
    del.onmouseenter=()=>{del.style.background="rgba(226,75,74,0.25)";del.style.borderColor="rgba(226,75,74,0.5)";del.style.color="#ff6b6b";del.style.transform="scale(1.1)";del.style.boxShadow="0 2px 12px rgba(226,75,74,0.2)";};
    del.onmouseleave=()=>{del.style.background="rgba(30,20,20,0.6)";del.style.borderColor="rgba(240,136,122,0.12)";del.style.color="#f0887a";del.style.transform="scale(1)";del.style.boxShadow="none";};
    del.onclick=(e)=>{e.stopPropagation();if(confirm(`"${item.title}" 삭제할까요?`)){delItem(item.id);S.history.splice(idx,1);saveHist();render();}};
    card.onmouseenter=()=>{del.style.opacity="1";};
    card.onmouseleave=()=>{del.style.opacity="0";};
    card.appendChild(del);
    el.appendChild(card);
  });
}

/* ═══ API CALLS ═══ */
async function callAPI(system, content){
  const key=getKey();
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:16000,system,messages:[{role:"user",content}]})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`API 오류 (${res.status})`);}
  const data=await res.json();
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

async function handleStep1(){
  const key=getKey();if(!key||!key.startsWith("sk-")){S.error="API 키를 입력해주세요";render();return;}
  const fT=S.inputs.titles.filter(t=>t.trim()).length,sL=S.inputs.script.length;if(!fT||!sL){S.error="제목 1개+스크립트 필수";render();return;}
  S.error="";S.loading=true;S.step1Result="";S.step2Result="";S.step3Result="";S.step4Result="";S.step5Result="";S.currentStep=1;S.progress=0;S.tab="result";render();
  const timer=setInterval(()=>{S.progress=Math.min(S.progress+Math.random()*6,92);render();},1000);
  const parts=[];
  if(S.reference.trim())parts.push(`## 참조\n${S.reference}\n---`);
  parts.push("## 제목");S.inputs.titles.forEach((t,i)=>{if(t.trim())parts.push(`${i+1}. ${t}`);});
  if(S.inputs.script.trim())parts.push(`\n## 원본 스크립트\n${S.inputs.script}`);
  try{
    const text=await callAPI(buildSP1(), [{type:"text",text:parts.join("\n")}]);
    clearInterval(timer);S.progress=100;S.step1Result=text;S.loading=false;
    const sty=STYLES.find(s=>s.id===S.selStyle);
    const item={id:Date.now().toString(),date:new Date().toISOString(),title:S.inputs.titles.find(t=>t.trim())||"제목 없음",style:sty?sty.name:"",maxStep:1};
    saveItem({...item,step1:text,step2:"",step3:"",step4:"",step5:""});S.history=[item,...S.history].slice(0,50);saveHist();render();
  }catch(err){clearInterval(timer);S.loading=false;S.error=err.message;S.tab="input";render();}
}

async function handleAsIs(){
  const key=getKey();if(!key||!key.startsWith("sk-")){S.error="API 키를 입력해주세요";render();return;}
  const fT=S.inputs.titles.filter(t=>t.trim()).length,sL=S.inputs.script.length;if(!fT||!sL){S.error="제목 1개+대본 필수";render();return;}
  const titleList=S.inputs.titles.filter(t=>t.trim()).map((t,i)=>`${i+1}. ${t}`).join("\n");
  S.step1Result=`## 🎬 제공된 대본 (원본 그대로)\n\n### 제목 후보\n${titleList}\n\n### 대본\n${S.inputs.script}`;
  S.step2Result="";S.step3Result="";S.step4Result="";S.step5Result="";S.currentStep=2;S.error="";S.tab="result";
  const sty=STYLES.find(s=>s.id===S.selStyle);
  const item={id:Date.now().toString(),date:new Date().toISOString(),title:S.inputs.titles.find(t=>t.trim())||"제목 없음",style:sty?sty.name:"",maxStep:1,isAsis:true};
  saveItem({...item,step1:S.step1Result,step2:"",step3:"",step4:"",step5:""});S.history=[item,...S.history].slice(0,50);saveHist();
  render();await handleStep2();
}

async function handleStep2(){
  if(!S.step1Result){S.error="STEP 1을 먼저 완료하세요";render();return;}
  S.error="";S.loading=true;S.currentStep=2;S.progress=0;render();
  const timer=setInterval(()=>{S.progress=Math.min(S.progress+Math.random()*6,92);render();},1200);
  const content=[{type:"text",text:`대본을 기반으로 캐릭터 바이블 + 스토리보드를 생성하세요.\n\n---\n${S.step1Result}\n---`}];
  try{
    const text=await callAPI(buildSP2(), content);
    clearInterval(timer);S.progress=100;S.step2Result=text;S.loading=false;
    _updateHist({step2:text,maxStep:2});render();
  }catch(err){clearInterval(timer);S.loading=false;S.error=err.message;render();}
}

async function handleStep3(){
  if(!S.step2Result){S.error="STEP 2를 먼저 완료하세요";render();return;}
  S.error="";S.loading=true;S.currentStep=3;S.progress=0;render();
  const timer=setInterval(()=>{S.progress=Math.min(S.progress+Math.random()*6,92);render();},1200);
  const content=[];
  S.bgImages.forEach((img,i)=>{content.push({type:"image",source:{type:"base64",media_type:img.type||"image/jpeg",data:img.base64}});content.push({type:"text",text:`[배경 참조 ${i+1}]`});});
  S.charImages.forEach((img,i)=>{content.push({type:"image",source:{type:"base64",media_type:img.type||"image/jpeg",data:img.base64}});content.push({type:"text",text:`[캐릭터 참조 ${i+1}]`});});
  content.push({type:"text",text:`아래 스토리보드의 각 씬에 대해 이미지 프롬프트를 생성하세요.\n\n---\n${S.step2Result}\n---`});
  try{
    const text=await callAPI(buildSP3(), content);
    clearInterval(timer);S.progress=100;S.step3Result=text;S.loading=false;
    _updateHist({step3:text,maxStep:3});render();
  }catch(err){clearInterval(timer);S.loading=false;S.error=err.message;render();}
}

async function handleStep4(){
  if(!S.step3Result){S.error="STEP 3을 먼저 완료하세요";render();return;}
  S.error="";S.loading=true;S.currentStep=4;S.progress=0;render();
  const timer=setInterval(()=>{S.progress=Math.min(S.progress+Math.random()*6,92);render();},1200);
  const content=[{type:"text",text:`아래 이미지 프롬프트에 대해 각각 영상 모션 프롬프트를 생성하세요.\n\n---\n${S.step3Result}\n---`}];
  try{
    const text=await callAPI(buildSP4(), content);
    clearInterval(timer);S.progress=100;S.step4Result=text;S.loading=false;
    _updateHist({step4:text,maxStep:4});render();
  }catch(err){clearInterval(timer);S.loading=false;S.error=err.message;render();}
}

async function handleStep5(){
  if(!S.step1Result){S.error="STEP 1 대본이 필요합니다";render();return;}
  S.error="";S.loading=true;S.currentStep=5;S.progress=0;render();
  const timer=setInterval(()=>{S.progress=Math.min(S.progress+Math.random()*6,92);render();},1000);
  const content=[{type:"text",text:`아래 대본을 기반으로 유튜브 업로드 패키지를 생성하세요.\n\n---\n${S.step1Result}\n---`}];
  try{
    const text=await callAPI(buildSP5(), content);
    clearInterval(timer);S.progress=100;S.step5Result=text;S.loading=false;
    _updateHist({step5:text,maxStep:5});render();
  }catch(err){clearInterval(timer);S.loading=false;S.error=err.message;render();}
}

function _updateHist(updates){
  if(S.history.length>0){
    Object.assign(S.history[0],updates);
    const full=loadItem(S.history[0].id);
    if(full){Object.assign(full,updates);saveItem(full);}
    saveHist();
  }
}

S.history=loadHist();
document.getElementById("apiKeyInput").addEventListener("input",function(){S._keySession=this.value;saveKeySecure(this.value);render();});
document.getElementById("saveKeyToggle").addEventListener("change",function(){if(this.checked){saveKeySecure(getKey());}else{try{localStorage.removeItem("ss4-ek");}catch{}}updateSecurityNotice();});

try{if(!document.getElementById("apiKeyInput").value){const central=JSON.parse(localStorage.getItem('dodo-ws-api-keys')||'{}');if(central.claude){document.getElementById("apiKeyInput").value=central.claude;S._keySession=central.claude;render();}}}catch(e){}
render();
